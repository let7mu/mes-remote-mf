name: Deploy remote-azure → Azure Static Web Apps

on:
  push:
    branches:
      - main
    paths:
      - 'projects/remote-azure/**'
      - '.github/workflows/deploy-remote-azure.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - 'projects/remote-azure/**'

jobs:
  # ── Build & deploy on push / PR open ──────────────────────────────────────
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.action != 'closed')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build remote-azure
        run: npm run build:remote-azure

      # Copy SWA routing config (SPA fallback + CORS) into build output
      - name: Add staticwebapp.config.json
        run: cp projects/remote-azure/staticwebapp.config.json dist/remote-azure/browser/

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          # Point directly at the pre-built folder; skip internal build
          app_location: dist/remote-azure/browser
          skip_app_build: true
          output_location: ""

  # ── Clean up staging environment when PR is closed ────────────────────────
  close-staging:
    runs-on: ubuntu-latest
    name: Close PR staging
    if: github.event_name == 'pull_request' && github.event.action == 'closed'

    steps:
      - name: Close Azure SWA staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: close
