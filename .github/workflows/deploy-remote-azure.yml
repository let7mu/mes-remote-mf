name: Deploy remote-azure → Azure Static Web Apps

on:
  push:
    branches:
      - main
    paths:
      - 'projects/remote-azure/**'
      - '.github/workflows/deploy-remote-azure.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - 'projects/remote-azure/**'

jobs:
  # ── Build & deploy on push / PR open ──────────────────────────────────────
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.action != 'closed')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          # Build from repo root with an explicit project command to avoid
          # ambiguous `ng build` in this multi-project workspace.
          app_location: "."
          app_build_command: "npm run build:remote-azure"
          output_location: "dist/remote-azure/browser"
          config_file_location: "projects/remote-azure"

  # ── Clean up staging environment when PR is closed ────────────────────────
  close-staging:
    runs-on: ubuntu-latest
    name: Close PR staging
    if: github.event_name == 'pull_request' && github.event.action == 'closed'

    steps:
      - name: Close Azure SWA staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: close
